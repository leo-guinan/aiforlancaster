<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1600px;
    height: 2560px;
    overflow: hidden;
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
    background: #0a0a0a;
    position: relative;
  }

  /* The photo — positioned in the lower-middle area */
  .photo-container {
    position: absolute;
    top: 800px;
    left: 0;
    right: 0;
    height: 900px;
    overflow: hidden;
  }

  .photo-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 40%;
    filter: brightness(0.7) contrast(1.1) saturate(0.85);
  }

  /* Gradient overlays to blend photo into black */
  .photo-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 250px;
    background: linear-gradient(to bottom, #0a0a0a 0%, transparent 100%);
    z-index: 2;
  }

  .photo-container::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 300px;
    background: linear-gradient(to top, #0a0a0a 0%, transparent 100%);
    z-index: 2;
  }

  /* Title block */
  .title-block {
    position: absolute;
    top: 180px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
  }

  .pre-title {
    font-size: 48px;
    font-weight: 300;
    color: #b0b0b0;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .main-title {
    font-size: 168px;
    font-weight: 800;
    color: #F5F0E8;
    line-height: 0.95;
    letter-spacing: -3px;
    margin-bottom: 30px;
  }

  .accent-line {
    width: 480px;
    height: 3px;
    background: #D4A843;
    margin: 0 auto 50px auto;
  }

  .subtitle {
    font-size: 38px;
    font-weight: 300;
    color: #B8C4D0;
    line-height: 1.5;
    max-width: 900px;
    margin: 0 auto;
  }

  /* Bottom block */
  .bottom-block {
    position: absolute;
    bottom: 140px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
  }

  .author {
    font-size: 36px;
    font-weight: 400;
    color: #F5F0E8;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .open-source-badge {
    font-size: 22px;
    font-weight: 300;
    color: #D4A843;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Subtle vignette on the whole page */
  .vignette {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    box-shadow: inset 0 0 200px 80px rgba(0,0,0,0.5);
    z-index: 5;
    pointer-events: none;
  }
</style>
</head>
<body>

  <div class="photo-container">
    <img src="file:///Users/leoguinan/clawd/local-ai-business/kdp/satoshi-film-broll.jpg" alt="Main Street, Lancaster, Ohio">
  </div>

  <div class="title-block">
    <div class="pre-title">AI for</div>
    <div class="main-title">Lancaster</div>
    <div class="accent-line"></div>
    <div class="subtitle">A Main Street Guide to<br>AI That Actually Works</div>
  </div>

  <div class="bottom-block">
    <div class="author">Leo Guinan</div>
    <div class="open-source-badge">Open Source &bull; CC BY-SA 4.0</div>
  </div>

  <div class="vignette"></div>

</body>
</html>
